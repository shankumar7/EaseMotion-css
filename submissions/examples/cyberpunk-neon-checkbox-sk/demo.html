<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberpunk Neon Checkbox | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- The Checkbox Container -->
  <label class="cyberpunk-checkbox-label">
    <!-- Hidden native input -->
    <input type="checkbox" class="cyberpunk-checkbox">
    <!-- Custom stylized box -->
    <span class="cyberpunk-box"></span>
    <!-- The label text -->
    <span class="cyberpunk-text">Override Core</span>
  </label>

</body>
</html>
