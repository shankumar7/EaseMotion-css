<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Hamburger to Cross Menu | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- The Menu Container (must be a label so clicking anywhere checks the box) -->
  <label class="hamburger-menu">
    <!-- The hidden checkbox managing the open/close state -->
    <input type="checkbox" class="hamburger-checkbox">
    
    <!-- The 3 lines of the hamburger -->
    <span class="hamburger-line top"></span>
    <span class="hamburger-line middle"></span>
    <span class="hamburger-line bottom"></span>
  </label>

</body>
</html>
