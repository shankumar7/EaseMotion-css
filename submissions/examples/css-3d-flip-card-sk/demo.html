<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 3D Interactive Flip Card | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- The 3D Camera/Perspective Container -->
  <div class="flip-card-container">
    
    <!-- The spinning wrapper -->
    <div class="flip-card-inner">
      
      <!-- The Default Front Face -->
      <div class="flip-card-front">
        <h2>Hover Me</h2>
        <p>To reveal the secret</p>
      </div>
      
      <!-- The Hidden Back Face -->
      <div class="flip-card-back">
        <h2>Hello World!</h2>
        <p>This is built entirely with CSS `preserve-3d` and `rotateY()`.</p>
      </div>
      
    </div>

  </div>

</body>
</html>
